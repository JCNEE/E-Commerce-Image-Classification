services:
  - type: web
    name: e-commerce-image-classification
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.web_app:server
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: USE_TRAINED_MODEL
        value: "false"