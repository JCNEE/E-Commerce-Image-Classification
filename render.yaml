services:
  - type: web
    name: e-commerce-image-classification
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn src.web_app:server --workers 1 --threads 2 --timeout 180
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: USE_TRAINED_MODEL
        value: "true"
      - key: MODEL_BACKEND
        value: mobilenet_v2_tflite
